<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Journaling Star Map — Your Night Sky</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(ellipse at 55% 32%, #1a2040 77%, #000 100%);
      font-family: 'Cormorant Garamond', serif;
      color: #fff; display: flex; flex-direction: column; align-items: center;
    }
    .starmap-wrap {
      margin-top: 44px;
      background: rgba(32,28,64,0.94);
      border-radius: 21px;
      box-shadow: 0 7px 40px #080b1855;
      padding: 22px 11px 17px;
      max-width: 377px;
      width: 98vw;
      text-align: center;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55em;
      letter-spacing: 1.1px;
      margin-bottom: 6px;
    }
    .desc {
      color: #ffe087;
      font-size: 1em;
      margin-bottom: 22px;
      font-family: 'Montserrat',sans-serif;
      opacity: 0.91;
    }
    .star-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 17px 13px;
      justify-content: center;
      margin: 0 auto 19px;
      width: 100%;
      max-width: 288px;
    }
    .star-btn {
      width: 28px; height: 28px;
      background: none; border: none; border-radius: 50%;
      cursor: pointer;
      transition: box-shadow 0.18s, transform 0.13s;
      font-size: 1.45em;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow: none;
      outline: none;
    }
    .star-btn.glow {
      color: #ffe087;
      filter: drop-shadow(0 0 7px #ffe087c0);
      animation: glow 2.3s ease-in-out infinite alternate;
      box-shadow: 0 0 12px #ffe087cc;
    }
    @keyframes glow {
      0% { filter: drop-shadow(0 0 6px #ffe08766); }
      100% { filter: drop-shadow(0 0 18px #ffe087ee);}
    }
    .star-day-num {
      position: absolute;
      bottom: -15px; left: 50%; transform: translateX(-50%);
      font-size: 0.76em;
      color: #ffe087cc;
      font-family: 'Montserrat',sans-serif;
      letter-spacing: 0.03em;
      opacity: 0.72;
    }
    .copyright { font-size: 0.89em; color: #ffe087; opacity: 0.77; margin-top: 14px;}
    /* Modal */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.51);
      display: none; align-items: center; justify-content: center;
      z-index: 20;
    }
    .modal-bg.active { display: flex; }
    .modal-panel {
      background: #181c2b;
      border-radius: 15px;
      max-width: 96vw;
      width: 333px;
      padding: 27px 14px 17px;
      box-shadow: 0 6px 40px #ffe08722;
      color: #fff;
      text-align: center;
      position: relative;
    }
    .modal-panel input,
    .modal-panel textarea {
      border-radius: 8px;
      border: 1px solid #ffe08799;
      background: #16192a;
      color: #fff;
      font-size: 1.1em;
      font-family: inherit;
      padding: 7px 11px;
      margin-bottom: 14px;
      width: 100%;
    }
    .modal-panel textarea { min-height: 74px; }
    .modal-panel label { font-size: 1em; color: #ffe087; margin-bottom: 4px; display: block; }
    .modal-actions {
      display: flex; gap: 10px; justify-content: center;
    }
    .modal-actions button {
      background: #ffe087;
      color: #181c2b;
      border: none;
      border-radius: 7px;
      padding: 7px 15px;
      font-size: 1em;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.15s;
    }
    .modal-actions button.delete-btn {
      background: #8e3d2c;
      color: #fff;
    }
    .modal-actions button:hover { filter: brightness(0.92); }
    @media (max-width: 444px) {
      .starmap-wrap { margin: 2vw 0; padding: 8vw 2vw 8vw;}
      .star-grid { max-width: 98vw; }
    }
  </style>
</head>
<body>
<div class="starmap-wrap">
  <h1>Journaling Star Map</h1>
  <div class="desc">
    Each day, tap a star to log your mood, an emoji, or a line of reflection.<br>
    Watch your sky light up—this is your constellation.
  </div>
  <div class="star-grid" id="starGrid"></div>
</div>
<div class="copyright">© 2025 Verve N Veda · All local, all yours</div>

<!-- Modal for entry -->
<div class="modal-bg" id="starModalBg">
  <div class="modal-panel">
    <label for="starMood">Mood, emoji, or word for Day <span id="modalDay"></span></label>
    <input id="starMood" maxlength="22" placeholder="😊 peaceful, 🔥 creative, etc.">
    <label for="starNote">Short note (optional)</label>
    <textarea id="starNote" maxlength="144" placeholder="Write a short reflection, highlight, or gratitude..."></textarea>
    <div class="modal-actions">
      <button id="starSaveBtn">Save</button>
      <button id="starCancelBtn">Cancel</button>
      <button id="starDeleteBtn" class="delete-btn">Delete</button>
    </div>
  </div>
</div>

<script>
const N = 49; // 7x7 grid, can expand if you want!
let stars = [];
try { stars = JSON.parse(localStorage.getItem('journalingStars') || '[]'); }
catch { stars = []; }
while (stars.length < N) stars.push({mood:"",note:""});
function saveStars() { localStorage.setItem('journalingStars', JSON.stringify(stars)); }

const grid = document.getElementById('starGrid');
function renderGrid() {
  grid.innerHTML = "";
  for(let i=0;i<N;++i){
    const btn = document.createElement('button');
    btn.className = 'star-btn';
    btn.title = stars[i].mood || "Add reflection";
    btn.innerHTML = stars[i].mood ? '★' : '☆';
    if(stars[i].mood) btn.classList.add('glow');
    const num = document.createElement('div');
    num.className = 'star-day-num';
    num.textContent = (i+1);
    btn.appendChild(num);
    btn.onclick = ()=>openModal(i);
    grid.appendChild(btn);
  }
}
renderGrid();

// ----- Modal logic -----
const modalBg = document.getElementById('starModalBg');
const moodInput = document.getElementById('starMood');
const noteInput = document.getElementById('starNote');
const modalDay = document.getElementById('modalDay');
let editing = 0;
function openModal(idx){
  editing = idx;
  modalBg.classList.add('active');
  moodInput.value = stars[idx].mood || "";
  noteInput.value = stars[idx].note || "";
  modalDay.textContent = (idx+1);
  setTimeout(()=>moodInput.focus(),80);
}
function closeModal(){ modalBg.classList.remove('active'); }
document.getElementById('starSaveBtn').onclick = ()=>{
  stars[editing].mood = moodInput.value.trim();
  stars[editing].note = noteInput.value.trim();
  saveStars(); renderGrid(); closeModal();
};
document.getElementById('starCancelBtn').onclick = closeModal;
document.getElementById('starDeleteBtn').onclick = ()=>{
  stars[editing] = {mood:"",note:""}; saveStars(); renderGrid(); closeModal();
};
modalBg.onclick = (e)=>{ if(e.target===modalBg)closeModal(); };
document.addEventListener('keydown',e=>{
  if(modalBg.classList.contains('active') && (e.key==="Escape")) closeModal();
});
</script>
</body>
</html>
