Even though I wasn’t involved in what happened, and in truth spent most of that evening sitting in the back of a pickup truck, drinking a beer with a friend, I became the target of lies and a vicious review. The men involved rewrote the story to protect themselves. The women came to me afterward, shaken and disgusted by what they had endured, but their voices didn’t matter in a town already primed to blame the woman they could point to.

By then, I was already hearing rumors about myself that were completely untrue. I knew better than to speak out. I had learned how quickly the truth could be twisted and how easily a woman’s reputation could be destroyed. More than anything, I couldn’t wait to leave. I needed distance, not just geographically, but from a culture that punished survival while excusing abuse.

This is where things start getting interesting, and also where the pace of my life changed again. To understand it, I have to go back to the dancing.

I was ambitious. There’s no other honest way to say it. I was exhausted from working in the dive bar I’d been at, and I kept hearing the other girls talk about a club in Cleveland that was “high class.” At the time, I didn’t fully understand what that meant. I thought it simply meant nicer, more professional, and more money. What it really meant was that the expectations were higher in every way.

I went anyway. I auditioned, I was hired, and on my very first night, I made twelve hundred dollars. That was more money than I had ever made in a month before. I went back, and before I knew it, I was working two nights a week and earning more than I ever had in my life. For the first time in a long time, I felt like I could breathe. I was paying off debts, stabilizing my life, and imagining a future that didn’t feel constantly on the brink of collapse.

It didn’t last long.

After work on the eighth night, I stopped at a nearby Denny’s to eat before making the hour-long drive home, without a license, no less. When I came back out to my car, the rear window had been smashed. My suitcase was gone. Inside it were all of my dresses, shoes, and accessories, thousands of dollars’ worth of work attire. Everything I needed to work in that club was gone in a moment.

Without that wardrobe, I couldn’t return. That single break-in effectively shut the door on that opportunity and put me out of work again. It felt cruel in its timing, as if every time I found my footing, something unseen reached in and swept it away.

I went back into Denny’s, needing another cup of coffee and a few moments to collect my thoughts. I couldn’t call the police to report the break-in and theft, not with my suspended license and the chaos surrounding my life, so I just tried to breathe and think. I sat at the counter, staring into my coffee, when a man named Mohammed sat down next to me.

He was an interesting character, to say the least. Worn-out leather jacket in a Michael Jackson style, faded blue jeans, a white t-shirt, and hair slicked back like Elvis. I couldn’t help but tell him he was by far the most interesting person I’d ever met. He was Muslim, from New York City, just traveling through.

We started talking, and it was a relief. He had an open mind and a calm presence that I wasn’t used to encountering. I told him about my life, why I was in Cleveland, and the theft I had just endured. He didn’t judge me. Not once. He asked me what I dreamed of doing with my life. Without thinking, I told him I’d always wanted to open a health-food restaurant or café.

By the time I left, it was 4 a.m., and I had to get home. Before I walked out, he gave me his number and asked me to let him know that I made it back safely. I did.

In the spaces between judgment and survival, there is only the quiet truth of doing what it takes to keep going.





Chapter:  Juice In The Shadé


About two weeks later, he called out of the blue. He explained that he had a friend and family in Brooklyn who were losing a coffee shop and newspaper stand, they were struggling financially, and the space was about to close. He told me that after thinking about our conversation, he had researched juice bars and wondered if I’d consider partnering with him to open a small juice bar there. That’s how Juice in the Shade began, born out of coincidence, conversation, and a shared dream.

I agreed to go to New York. I flew there, toured the space, spoke with the landlord, and signed a sublet for the remaining two and a half years of the twenty-year lease that Mohammed’s friends were walking away from. The next day, I returned home, gathered my things, and told my mom what I was doing. My sisters, along with her, agreed to watch Justin while I got the store up and running.

I drove back to New York in a U-Haul. Mohammed had an apartment with two efficiencies side by side, so I had my own space. As soon as I arrived, I learned the subway system, familiarized myself with the neighborhood, and threw myself into the juice bar. In thirty days, with permits, renovations, stocking, and loading complete, Juice in the Shade was open. I was all business, focused, driven, and determined.

Unfortunately, Mohammed had developed a crush on me that I did not welcome. It quickly became clear that he was not handling it well. He would get jealous if I spoke to male customers, threw things around the apartment, slammed doors, and made working next to him increasingly uncomfortable. The tension escalated to the point where I had no choice but to take him to court to buy him out. Living right next door to each other made it even more complicated.

Through all of this, I learned quickly that entrepreneurship wasn’t just about finances or logistics; it was about navigating personalities, boundaries, and emotional dynamics. The juice bar thrived, but the personal challenges reminded me that even new beginnings come with their own storms.



Chapter: The Unburdening


Interlude 


In the hush between chapters,
The weight slips from my shoulders.

Stories once hidden rise into daylight,

each word a stone lifted
from the river of memory.



I offer them trembling and true:
the broken glass of old wounds,

the shimmer of fleeting peace,
the ache of what went unnamed,

and the courage to name it now.



This is the sound of letting go:
a breath held too long,
finally released.

A heart once quieted by fear
beating louder
in the presence of its own truth.



Let sorrow be honored.

Let shame unravel.

Let the laughter of children
ring like wind chimes
across a bruised horizon.


I lay down the armor,
the silence,
the blame,

to make room for gentler things:

the wild hope of becoming,
the soft dawn of forgiveness,
the blessing of being seen.

Here, in this pause,
I reclaim what was never truly lost.

I hold space for the girl I was
and give thanks for the woman
writing her way home.





Chapter: Entrepreneurship


I eventually acquired the juice bar outright and took full ownership.

At the time, I was still living in my small flat on Livingston Street in downtown Brooklyn. My days began early, waking at 5 a.m. to catch the subway down to Clark Street. The routine was relentless but grounding, the kind of exhaustion that comes from purpose rather than fear.

The juice bar was located at the Clark Street Station terminal entrance, directly beneath the St. George Hotel. Commuters passed through in steady waves each morning, their lives brushing past mine in seconds. I stood behind the counter watching the city move, feeding people something clean and alive before they disappeared back underground.

For the first time in a long while, the work felt honest. I had built something with my own hands, and every morning I unlocked the gate knowing exactly why I was there.





Chapter:  Bay Ridge


I met so many amazing people in New York, and I truly loved living there. I managed the juice bar on my own for about six months, settling into a rhythm that finally felt like stability, when I met Mario, another restaurateur.

His family owned an Italian restaurant on Montague Street. One day, he pulled up in a Porsche, came in for a juice and a sandwich, and struck up a conversation. He asked me out, but at first I genuinely didn’t have time. The shop consumed me. After a few weeks, I hired two new employees and finally allowed myself some personal space. That’s when I agreed to go on a date with him.

We started dating, and a few months later, he invited me to move into his four-story condo in Bay Ridge, Brooklyn. Eventually, Mike brought Justin up to live with me. I enrolled Justin in preschool, continued running the shop, and for a while, life felt full and balanced.

When my lease reached the 2½-year deadline, everything shifted. The landlord didn’t raise my rent by a few hundred dollars; he raised it from $700 a month to $3,700. I was furious and overwhelmed. There was no possible way I could sustain that with my income. Mario and I talked it through and decided we would eventually find another location, something larger, something with room to grow.

But time slipped by. I was happy with Mario, and he loved me. Justin was thriving in New York. From the outside, everything looked good.

Except it wasn’t.

Mario’s father hated me with a vengeance. He called me names as I walked past him, ignored me when I spoke, and made his contempt unmistakable. I understood it, even if it hurt. I was a single mother. I wasn’t a virgin. My business had closed. I was living with his son. They were old-fashioned Italians who had imagined a teenage Italian, an untouched princess for him.

Then Mario’s grandfather passed away, and Mario had to leave for Italy for four to six months to settle the estate. 

While he was gone, I made a decision I would later regret deeply.  I went back to Florida so Justin could spend time near his father.

It was one of the worst decisions I ever made.






Chapter: Coming Back to Ground

I loved New York. I still do. I was sad to leave it, and even now I catch myself imagining what it would be like to return. New York gave me anonymity, movement, and a sense that life could unfold without explanation. But it was also a hard place to raise a child. Daycare alone was monstrously expensive, and everything required stamina, timing, and money I didn’t always have.

Bringing Justin back to Florida was not what I wanted. It was what he needed.

When I arrived, I did what I’ve always done when the ground shifts beneath me: I rebuilt. I joined a gym right away, needing somewhere solid, somewhere with routine and physical release. I didn’t have a vehicle, so I bought a bike and started pedaling myself into a new rhythm. I got my waitressing job back at Molly Goodhead’s in Ozona. 

It was good money, familiar work, and I knew the flow of the place by heart. Familiarity mattered then. It still does.

I stayed there for a while, but there was a problem lingering in the background, one that followed me like unfinished business. I still didn’t have my driver’s license.

I had been without one for nearly 8 years, ever since a DUI at twenty-one. 

In New York, it hadn’t mattered. I didn’t need a car there. Florida was different. Florida wouldn’t issue me a license until I cleared everything in Ohio, and Ohio required me to physically appear in court. The problem was simple and impossible at the same time: I hadn’t been back to Ohio.

Eventually, I contacted the courts myself. I explained the situation. The judge was insistent, no clearance without a court appearance. So I made the trip. One issue. One purpose. One unfinished loop to close.

Standing there, resolving something that had quietly limited my freedom for nearly a decade, felt unexpectedly profound. It wasn’t dramatic. It was procedural. But it was freeing. For the first time in years, I wasn’t carrying that invisible restriction anymore.

I reinstated my license immediately.

It felt like reclaiming movement, not just the ability to drive, but the ability to choose. To go forward without dragging an unresolved past behind me. I didn’t know then how many new obstacles would arise later, how many times my autonomy would be questioned or interrupted again. But in that moment, I had something back that I hadn’t realized how deeply I’d missed.

Agency.

And for a while, that was enough.




Chapter: Choosing to Stay


After that trip, I went back to Florida. Life resumed its quieter rhythm, and for the most part, it was going well. I was settled in my small apartment, working steadily, keeping myself grounded. For the first time in a long while, I felt like I was moving forward instead of just surviving.

I was still talking to Mario every once in a while. Our connection hadn’t disappeared, but it had changed. When he came to visit me in Florida after returning from Italy, the difference between us was impossible to ignore. Things weren’t the same. Not because the care was gone, but because the weight around it had grown heavier.

I wasn’t ready to walk back into the hatred and judgment his family had shown toward me. That part of my life had taken enough from me already. I knew what it cost to constantly defend my worth, my choices, my very existence. I couldn’t do it again, not then, and maybe not ever.

So I chose to stay.

That decision wasn’t easy. I really cared for him. There are still moments when I think about the last time I saw him, how it felt, what went unsaid, how final it was without either of us admitting it. I still have the letter he wrote to me. I’ve kept it all this time. Some things are too meaningful to let go of, even when the relationship itself can’t continue.

But Florida was steady. My life here was beginning to make sense. I had routine, work, and a sense of direction. More importantly, I had momentum, something fragile that I knew could shatter if I made the wrong choice. Staying on track mattered more than revisiting a love that came with conditions I couldn’t survive again.

Sometimes loving someone means recognizing the cost of staying connected to them. This was one of those times.

So I stayed where I was. I kept building. And even though part of my heart lingered in what might have been, I chose the version of my life that allowed me to breathe.




Chapter: Momentum and Missteps

Life felt exciting then. I was young, energized, and once again full of plans. I had my heart set on opening another juice bar in Florida. I started doing what dreamers do, saving what I could, scouting locations, imagining what it might look like. But reality kept interrupting the vision. I needed capital, not just hope, and I didn’t have it.

So I made a decision I knew was risky.

I went back to dancing, this time at a club in Clearwater. It felt irresponsible because I knew exactly what came with that world: the nightlife, the drinking, the parties, the constant pull away from structure. I made good money, fast money, but it wasn’t steady. 

It didn’t resemble the life I had been trying so hard to build. It felt like borrowing from myself, with interest I’d eventually have to pay.

Still, that chapter didn’t end the way it easily could have.

A regular customer kept telling me he would hire me if I wanted out. He ran a software firm and said I had the personality, the drive, the instincts for sales. I didn’t see myself in tech at all.  I had never worked in software, never sold anything more complex than juice or a vision, but eventually, I leaped.

I left dancing and went to work for his company, selling computer software. To my surprise, I was good at it. Really good. I made just as much money as I ever had dancing, but this time it came with daylight, contracts, and credibility. For the first time, I felt respected in a professional setting that had nothing to do with how I looked or who was watching me.

In 1999, we took it a step further and opened a company together: Computer People Software, Inc. We focused on hardware recovery software, and suddenly, I was running a tech business. Something I never could have predicted for myself. 

I learned fast. I handled sales, relationships, and operations. I ran that company for a couple of years, and I was proud of what I was building.

Then everything unraveled.

Joe started drinking heavily, and things became complicated in ways I couldn’t ignore. What finally broke it open was discovering he had been selling software to old customers by charging their credit cards without authorization. What we called “writing wood.” I never would have known if the technicians hadn’t started sending the product back, telling me they hadn’t ordered anything.

I was stunned.

When I confronted him, he confessed. I immediately stepped in, resolved the damage, made things right with the affected customers, and shut the business down. No version of success justified that kind of betrayal: of clients, of ethics, of trust. I didn’t want to work with him anymore. I couldn’t.

Closing that company was painful, but it was also clarifying. I walked away knowing I had done the right thing, even though it meant losing something I had worked hard to build. I had crossed into a world I never planned to enter, proven to myself that I could succeed there, and then chose to leave rather than compromise who I was becoming.

That mattered more than money.





Chapter:  Moving Forward Alone

The next phase of my life didn’t arrive neatly. It came as a collage, overlapping jobs, shifting relationships, and moments that felt disconnected at the time but would later reveal their shape.

I moved to Dunedin and found work at a steak restaurant, doing a little of everything: hostessing, cocktail waitressing, serving food. It was a good job. The pace was busy, the money was decent, and for once, I felt anchored again. Around the same time, I also started working at a shop that sold stencils for mural painting. It felt like a bridge back to creativity, to color, form, and expression.  Something I had always returned to, no matter what else was happening in my life.

That’s where I met my daughter’s father.

We didn’t technically work together, but our paths overlapped through art. We painted, created, talked, and shared that space where ideas move faster than words. There was an ease to it, a sense of shared language. When I became pregnant and told him, everything changed.

He disappeared.

He skipped town without explanation, without conversation, without accountability. I was devastated. Confused. Angry. There’s no clean way to process being abandoned at a moment when your life is fundamentally changing. I had questions with no answers and emotions with nowhere to land. But there was nothing I could do except keep going, alone.

He denied our daughter for thirteen years.

Thirteen years of silence. Thirteen years of absence. Thirteen years of raising her without his acknowledgment, his support, or his presence. I carried that reality quietly, doing what needed to be done, protecting her from questions she was too young to answer.

I didn’t hear from him again until after a serious accident left me physically crippled. At that point, I needed help.  

Not emotionally, not symbolically, but practically. I needed him to contribute child support while I healed. That request did not bring accountability. It brought hostility.

He became angry and threatened to take her from me entirely.

He lied to his family, telling them that I had prevented him from being part of her life. He tried to rewrite history in a way that placed blame on me for his absence. Those lies created problems I never should have had to navigate, especially while recovering and vulnerable. The situation escalated to the point where we needed a mediator just to establish boundaries and basic expectations.

Even then, he never became a stabilizing force. He was a saboteur, not just to me, but to any sense of peace or consistency around our daughter. His involvement, when it came, brought disruption rather than support.

Still, I held the line.

I protected my child as best I could. I maintained structure where he introduced chaos. I continued forward, even when doing so required strength I wasn’t sure I had left. Motherhood didn’t arrive for me wrapped in partnership or shared responsibility. It arrived demanding resilience, clarity, and the willingness to stand alone when necessary.

And I did.



Chapter:  Autonomy


During my pregnancy with Autumn, I was involved in a terrifying car accident that could have changed everything.

I was eight months pregnant at the time and driving with Justin in the car. He was ten years old. We were stopped at a red light at Alderman Road and U.S. 19 when I looked over and noticed he wasn’t wearing his seat belt. I gently scolded him and told him to put it on immediately. He did. We continued north on U.S. 19, unaware of how close we were to disaster.

Less than a mile later, an S-10 pickup truck came flying across the highway from the median. I barely had time to register what was happening. I was traveling at around 55 miles per hour when I saw him coming from the left. I hit the brakes, but there was no time to spare. Instead of crossing straight through, the truck, packed 5 feet high with lawn furniture, fishtailed from the right turn lane directly into my path. At the time I struck him, he was moving maybe 20 miles per hour, but the impact was violent. The car was totaled.

Thank Heavens, I had told Justin put his seat belt on just a few minutes earlier.  He hit his forehead on the dashboard, leaving a permanent scar.   
We have talked about that many times.  It was a miracle. 

From the Accident, we were rushed to the Women’s Center in Tampa. Almost immediately, I was told I was “going into labor” and that they were preparing me for an emergency C-section. I was overwhelmed and terrified. My body hurt from the crash, especially my lower abdomen from the seatbelt, but I had been in labor before, and I didn’t feel like I was in labor.

I told the doctor, a stern German-Russian man, that something didn’t feel right, that this didn’t feel like labor. They performed an ultrasound, and he told me directly that my water had broken in the accident and that there was no amniotic fluid surrounding the baby.

I panicked.

Up until that moment, I had been under the care of a midwife and was planning a completely natural birth at Labor of Love Birthing Studios. Suddenly, that plan was being ripped away from me. I was placed on a cold metal gurney with nothing but a sheet over me, sore, shaken, and frightened. Then they left me there, alone, for over an hour without care, explanation, or comfort.

Eventually, I was given a phone. I called my midwife and told her exactly what had happened: the accident, the ultrasound, the doctor’s claim that my water had broken. She listened carefully and then told me something that went against everything the hospital was telling me: to sign myself out, go home, rest, keep my phone nearby, and come see her first thing in the morning.

I trusted her.

I followed her instructions exactly. A dear friend came to the hospital to pick Justin and me up.  When I went in for a full physical examination and fetal monitoring the next day, everything was normal. My blood pressure was stable. The baby’s heartbeat was strong. I even scheduled an ultrasound to be sure. There was no sign that my water had broken. No emergency. No crisis.

It had all been a lie.


I carried Autumn to full term and went on to have a completely natural, empowering, and beautiful birth, exactly as I had planned. Looking back, that experience left a deep impression on me. It taught me how easily fear can be manufactured, how quickly autonomy can be stripped away, and how vital it is to trust your own body and your own voice, especially when others insist you are powerless.



Chapter: Another New Beginning

After the accident, I began seeing a chiropractor in Tarpon Springs who came highly recommended for working with pregnant women. The treatments helped me tremendously, both before and after Autumn’s birth. Over time, I became familiar with the office and the people there, and after a few months, the office manager approached me with an unexpected request. She asked if I would paint a small mural in her home.

At the time, I hadn’t seriously considered mural painting. I had never worked on a large scale before; everything I’d done up to that point was on canvas. The idea felt unfamiliar and slightly intimidating, but I agreed.

The mural was in her entryway, a simple beach scene with seagrass, dunes, and a white picket fence peeking through. It wasn’t elaborate, but it was my first experience painting directly onto a wall, working with space instead of edges. Looking back, that small project often slips my mind. Life was chaotic then, full of upheaval and survival. But that quiet act of creativity planted a seed that would grow into something much larger than I could have imagined at the time.


Autumn was such a beautiful baby, and after her birth, I felt a deep knowing that my life had to stabilize, not someday, but now. We rented a small house between Palm Harbor and Tarpon Springs, right along the Pinellas Trail. 

It was modest, but it was ours. We lived there for four years. 

We started attending a small Baptist church on the hill, and slowly, deliberately, I began building a steadier life, one rooted in responsibility, intention, and the belief that I could create something lasting for myself and my children.



Chapter: Choosing Myself

Over the next several years, I changed direction again. By then, I had healed from several serious accidents, had two children 10 and 1,  and was independent.  I had learned that people were unpredictable, that they served their own interests before others, that they would come and go, and that circumstances would rise and collapse. Stability was never something handed to me; it was something I had to build deliberately. 

What I wanted more than anything was to be self-sufficient, to be in control of my life and my time. I was exhausted by waitressing jobs, by schedules that belonged to someone else, by the constant feeling that I was surviving but not progressing.

I made a promise to myself: I would never go back to dancing for money.

No matter how tempting.
No matter how desperate things felt.

I needed a fresh start.  I needed something that I could be proud of myself for accomplishing.  Something that belonged to me.


So I asked myself a question I had avoided for years: What do I truly want to be doing? What kind of work would actually make me happy? I sat down and made a list of my favorite things: painting, gardening, designing, singing, creating environments, and then I did something practical. I analyzed that list and brainstormed how each of those passions could realistically earn me a living.

That’s when the answer became clear.

I wanted to paint murals.

I had only one under my belt. 

The dream was bigger and farther away than I initially understood, but for the first time, it felt honest. I knew I didn’t yet have the professional experience to jump straight into that world, so I made a rule for myself: I would only apply for artistic jobs. If I were going to work, it had to move me closer to where I wanted to go.

That’s how I found an ad in the paper for a painting job in Tampa.

I applied and was hired onto a team of painters. The work itself was unlike anything I had seen before. Each day, our job was to mass-produce paintings, sometimes as many as 250 canvases a day, all identical. One artist would design a decorative painting, and then ten of us would each take a single color and a sponge. 

One stroke at a time, canvas by canvas, we would repeat the same motion over and over. By the end of the day, those small, mechanical gestures added up to hundreds of finished “original” paintings.

At the very end of the process, one artist would walk around and add a fake signature to each canvas.

It was mesmerizing.

We didn’t make much money, but I learned something invaluable: how vast and layered the art industry actually was. I realized that many of the hand-painted canvases sold in home décor stores weren’t created by solitary artists in studios; they were created by teams, systems, and production pipelines. 

Art, I learned, could be both creative and industrial.

That realization opened my eyes.

One afternoon during my lunch break, while heading out to grab food, I saw a sign for another business looking for artists: Dr. Doodle Inc. On impulse, I walked in. I was hired on the spot and began working there a few days a week in addition to my other job.

I completed three murals for them. On the fourth one, something in me shifted. Quietly, almost instinctively, I added my signature to the wall.

I knew I wasn’t supposed to.

At Dr. Doodle, we weren’t allowed to take personal credit for our work. We weren’t even allowed to include the murals in our personal portfolios. The work belonged entirely to the company, and authorship was erased by design. Somehow, the owner noticed my signature or saw me add it, and threatened to fire me, to sue me if I ever did it again.

I stayed through the completion of that project, but I already knew what the moment meant.

That small act of signing my name wasn’t a rebellion. It was recognition. I understood then that I didn’t want to spend my life creating anonymously, building other people’s brands while erasing myself in the process. I wanted ownership. I wanted authorship. I wanted to stand behind what I created and say, This is mine.

So when that mural was finished, I made a decision.

I would go off on my own.

I didn’t have a roadmap. I didn’t have money, backing, or guarantees. But for the first time, I trusted myself enough to believe that if I didn’t claim my work, no one ever would. That decision marked the beginning of something new, not just a career, but a declaration of identity.

And once I chose myself, there was no going back.

After leaving Tampa that day, I drove home without any real plan for what came next. Somewhere between habit and instinct, I pulled into Giacomelli’s Auto Repair on Crystal Beach Avenue. I had passed that building thousands of times over the years on my way to Crystal Beach or to Karla’s house, never once imagining it would become a turning point in my life. 

On a whim, I walked in and asked the owners if they had ever considered painting a mural of old cars on the side of their building. To my surprise, they told me they had just been talking about it that very weekend. They already had images in mind.   

She opened the desk drawer and pulled out the old car images that they wanted on the wall. All they needed was someone willing to do it. It was meant to be. 

They paid me very little and only covered the cost of supplies, but what I gained in that moment mattered far more than money. Over the following weeks, I painted my first large-scale, solo, public mural.  Not as part of a team, not under a company name, and not in the shadow of someone else’s signature. 

It was the first time I stood in front of a wall that large with only my own vision to guide me and only my own hands responsible for the outcome. Every line, every decision, every mistake and correction belonged to me. No one else took credit. No one else absorbed the risk. For the first time, I wasn’t assisting, reproducing, or disappearing into someone else’s work. I was there as an independent professional artist, fully visible, and unmistakably my own.

Just me, a wall, and my vision. 

This was the first time my work existed in a public space because I made it happen. 

That mural marked the moment I stopped waiting for permission and stepped fully into my own identity as a muralist, not as an aspiration, but as a lived reality.




Chapter: Lesson In Self-Worth


It wasn’t all roses after that. Finding mural work was genuinely hard. I had only two projects to show, barely enough to convince anyone to trust me with a wall. Striking out on my own created an immediate financial void, and inspiration alone didn’t pay the bills. To survive, I started painting houses, interiors, and exteriors.  Work that wasn’t my dream but steadily sharpened my technical skills and discipline. I told myself that if I persisted, even work that wasn’t ideal would still move me closer to where I wanted to be.

I turned to guerrilla marketing out of necessity. I ordered business cards, assembled a not-so-professional flip-book portfolio, and walked into every business I could find that had a potential wall. It was tedious and humbling, but slowly, it worked. One project at a time, momentum began to build. The early jobs were informal and uneven: favors, barters, and small payments that barely covered my time. I gave my skills away far too cheaply in the beginning, believing that access and exposure were worth more than money.


Looking back now, I can see that many of those clients received far more value than they paid for. What began as survival pricing quietly became a trap. For years afterward, everyone I knew expected me to paint for almost nothing, and I struggled to escape the rates I had set out of desperation. 

I spent nearly a decade trying to recalibrate my worth, caught between gratitude for the work and the slow realization that undervaluing myself had become its own form of confinement.




Chapter:  Pleasant Valley

I was on a good path then. Not an easy one, but a hopeful one. I struggled financially, often more than I admitted to anyone, but I was grounded. I was going to church. I was raising my children. I was building something with my hands and my heart as a muralist and painter.

Art, especially mural work, is a give-and-take profession. You can be busy one month and completely idle the next. Weeks could pass without a single paid project. Sometimes months. When work dried up, I didn’t stop creating. I couldn’t afford to. I began painting the church’s delivery box truck, covering it in beach scenes, sunsets, and expansive skies. When there was no paying work, that truck became my canvas. I painted while the kids were at school and daycare, right along a busy road, hoping that someone might stop, ask a question, notice the work, and offer a commission.

A few small projects came from that visibility. Just enough to keep going. Never enough to create a real financial buffer.

At church, I gave everything I could. I volunteered for events, helped teach ESL classes, led Sunday school, and stepped in wherever there was a need. I loved it. It gave me purpose beyond survival. It gave me community. It gave my children stability.

Then a new couple began attending the church.

Within a few months, their judgment surfaced. Subtle at first. Then unmistakable. Their tone was patronizing, their smiles thin. Eventually, the pastor sat me down and told me what they had said: that they didn’t think it was a good image for a single mother of two with no official training to be leading anything at the church.

They were applying for a full-time position.

And I was quietly removed from ministry.

I could see it in Pastor Mike’s face; he was cornered. He told me gently, almost apologetically, that if I truly wanted to work in the church, I should consider going back to school and earning a ministerial degree.

I was devastated.

I had never asked for money. Not once. I wasn’t seeking a title or recognition. I loved teaching those classes. I loved those kids. I loved serving. And suddenly, all of that was taken away, not because I had failed, but because I didn’t fit someone else’s image of respectability.

That same day, still raw, I drove to pick up my daughter from preschool. On the way, I passed another church. Their roadside sign stopped me in my tracks:

“God does not call the prepared. He prepares the called.”

I pulled over and cried.

Something shifted in me. Not anger. Not bitterness. Clarity.

The very next day, I drove myself to Trinity College of Florida. I walked into the administration office, filled out an application, spoke with an advisor, and enrolled for the upcoming semester. I chose a track in family counseling and worship leadership.

If I were going to be removed for not being “qualified,” then I would become qualified: on my own terms, in my own time, without surrendering my calling to anyone else’s judgment.

It wasn’t defiance. It was obedience.


And it changed the direction of my life.



Chapter: The Saving Grace


While I continued for a short while at the Baptist church, Pastor Mike was incredibly supportive of my decision to return to school. Yet, the financial strain was relentless. Work wasn’t coming in, there were no prospects, and I reached a point where I didn’t know what to do next. I even considered briefly going back to dancing to make ends meet, though I never did and can barely remember that moment, it was a depressing, desperate time.

I questioned God. I couldn’t understand how, despite dedicating my life to Him, I could be struggling so profoundly. Diapers, food, daycare, an eviction notice from my landlord, a massive electric bill… it was overwhelming.

One night, after Justin and Autumn had gone to bed, I sat on my couch, completely depleted. I was bawling, delirious, crying out in anguish, accusing God of abandoning me even as I tried to follow Him. My despair felt endless.

Then, across the room, I saw it: a Bible sitting on the shelf. I walked to it, my heart racing, my mind pleading. “Why are You letting me slip through the cracks?” I whispered. I opened it, and the first words I saw were Matthew 11:28-30:

"Come to me, all you who are weary and burdened, and I will give you rest. Take my yoke upon you and learn from me, for I am gentle and humble in heart, and you will find rest for your souls. For my yoke is easy and my burden is light."

I prayed with everything I had that night. My tears stained the floor, my eyes were swollen and raw, yet for the first time in weeks, I slept deeply and peacefully. When I woke the next morning, the darkness had lifted slightly, my sadness dampened, hope returning in fragile sparks.

Reluctantly, I got Justin and Autumn ready for school and drove to the church. I had no money, no one to call, no plan beyond trusting that Jesus would somehow show me the next step. Standing beside a box truck outside the church, I cried on and off, feeling completely lost, alone, and forgotten.

Then Paul, a close friend and older mentor, and his wife Ellen, who cooked the Wednesday dinners at the church, arrived. They noticed my tear-streaked face and asked what had happened. I confided in Paul about my financial struggles. They weren’t in a position to help me materially, and I would never have asked, but Paul reminded me that Minnie, the office manager, had a check for me from helping at a golf tournament parking event a month earlier.

Paul called Minnie, and within the hour, she came to the church and handed me a $150 check. It wasn’t everything, but it was enough to pay my phone bill and buy some groceries. I remember standing in front of the diaper aisle, overwhelmed with relief, when my reactivated phone rang, it had been off for three days due to the unpaid bill.

A professional, friendly voice spoke on the other end. She had picked up my card at a local restaurant where I had painted a small project. She asked if I could meet her in half an hour. I went immediately to the location she gave me: a wall in a ground-floor lanai of a four-story condo on the water, where the client wanted a mural. The design was already prepared, the wall already prepared, and she sheepishly admitted that other artists she’d contacted couldn’t work within the client’s budget. Could I do it for $1,200?

I could barely contain my excitement. I concluded the meeting, drove home, a mile away, and fell to my knees, crying tears of gratitude and awe. That day, I devoted myself fully, without reservation, to my relationship with YHWH and YAHUSHUA.


It was the turning point, the moment when faith, perseverance, and opportunity intersected, and I realized that even in the darkest times, God’s guidance never truly abandoned me.



Chapter: Ralph Lowe and The Copper Kettle


Mom had married Ralph, an older man, about seventy-five at the time. He was remarkable. When I met him, he seemed vibrant and steady, a man fully at peace with who he was. But not long after their marriage, everything changed. Within months, he was on his deathbed. His decline was sudden and shocking, and when he passed, my mother was left devastated and furious.

Because of a paperwork issue, Ralph’s ex-wife ended up inheriting his estate. Mom had believed they were building a life together. They had bought a second home, an old farmhouse just outside of Bellville, complete with a barn. She poured her heart into it, turning part of it into a country store. I remember the ground floor vividly, a massive tree painted on the wall, its branches stretching across the ceiling so completely that it felt like you were standing beneath it, sheltered and small in the best way.

After Ralph’s death, Mom stayed in that house and eventually opened a 24-hour diner in Bucyrus, Ohio.  A truck stop called Mary’s Copper Kettle. About a year after opening, she was in a serious car accident, crashing into a tree. She was confined to a wheelchair for nearly a year. When I heard what had happened, I left my job in Florida without hesitation and drove to Ohio to help her keep the restaurant running.

I lived upstairs from the diner for nine or ten months and worked constantly, sometimes around the clock—doing whatever it took to keep the doors open. I discovered quickly that employees were stealing food, supplies, and cash from the register. It was hard to find dependable help in that town, but the work itself came naturally to me. Line cooking, waitressing, managing the restaurant, it all clicked. I carried the place the best I could while she recovered.

When my mom finally returned to work, something shifted. She told me she didn’t need me anymore. Just like that, I was let go. Fired. No real explanation. I was deeply hurt, confused, unappreciated, and discarded after giving everything I had. I packed up and left in my old blue ’89 F-150.

I stayed in Ohio for a short while after that, trying to regroup, and then I returned to Florida, carrying with me another lesson about family, sacrifice, and how love and loss often tangle together in ways we don’t expect.


Poetic Pause

Between Yesterday and What Comes Next

Let me rest here
for a moment,
in the hush between stories,
before the next truth unfolds.

Let me lay down
what I’ve carried so far,
the brittle weight of memory,
the ache of longing,
the bright shards of hope
I still gather from the dust.

Let these words be a lantern
for the road I cannot yet see,
a gentle hand on the small of my back
saying:
It’s okay to pause,
to gather breath,
to be exactly where you are.

What was lived cannot be unlived.
But what is carried
can be set down,
even if only for a heartbeat.

Here, in the in‑between,
may softness find me.
May I honor the girl
who walked through fire,
and welcome the woman
who is learning how to rise.

The next page waits,
patient and unwritten.

For now - 
let me be grateful for the light
that got me this far,
and for the courage
to turn the page.

   Config + Storage Keys
   ========================== */
const LINES_PER_PAGE   = 24;
const CHAPTER_ON_RIGHT = false;

const PAGE_TEXT_WIDTH_PX = 555; // 555 - 33 - 33 (must match CSS + measure)
const FONT_FAMILY      = `"Cormorant Garamond",serif`;
const FONT_SIZE_PX     = 14;     // must match CSS .body font-size
const LINE_HEIGHT      = 1.7;    // must match CSS --line-height
const LS_MARK          = "memoir_marker_v3";
const LS_LANG          = "memoir_lang_v1";
const LS_MODE          = "memoir_mode_v1";
const LS_BOOK_OFFLINE  = "memoir_offline_books_v1";  // { langCode: rawText }
const LS_TX_CACHE      = "memoir_translate_cache_v1"; // { "from|to|text": translated }

/* ==========================
   Measurement setup
   ========================== */
const measure = document.getElementById("measure");
measure.style.width = PAGE_TEXT_WIDTH_PX + "px";
measure.style.fontFamily = FONT_FAMILY;
measure.style.fontSize = FONT_SIZE_PX + "px";
measure.style.lineHeight = LINE_HEIGHT;

function normalize(raw){ return (raw||"").replace(/\r\n/g,"\n"); }
function paragraphs(raw){
  return normalize(raw).split(/\n\s*\n/).map(p=>p.trim()).filter(Boolean);
}
function isHeading(para){
  const rx = /^(PROLOGUE|CHAPTER)\b[\s\u00A0]*([A-Z0-9IVXLC]+)?\s*([—:-]+)?\s*(.*)$/i;
  const m = para.match(rx);
  if(!m) return null;
  const kind = m[1].toUpperCase();
  const num  = (m[2]||"").trim();
  const title= (m[4]||"").trim();
  const head = kind;
  const fullTitle = kind==="CHAPTER"
    ? (num ? `Chapter ${num}${title? " — "+title:""}` : `Chapter${title? " — "+title:""}`)
    : (title? `Prologue — ${title}` : `Prologue`);
  return {head, title: fullTitle, meta: ""};
}
function sentenceSplit(text){
  const re=/[^.!?…]+[.!?…]"?\s*/g, out=[]; let m;
  while((m=re.exec(text))!==null) out.push(m[0].trim());
  return out.length? out:[text];
}
function countLines(text){
  measure.textContent = text;
  const h = measure.scrollHeight;
  const lh = FONT_SIZE_PX * LINE_HEIGHT;
  return Math.ceil(h / lh);
}

/* ==========================
   Pagination
   ========================== */
/* Page = { body:string, head?:string, title?:string, meta?:string } */
function paginate(raw){
  const paras = paragraphs(raw);
  const pages = [];
  let currentBody = "";
  let currentMeta = null;

  function flushPage(){
    const body = currentBody.trim();
    if(body.length || currentMeta?.title){
      pages.push({
        body,
        head: currentMeta?.head || "",
        title: currentMeta?.title || "",
        meta: currentMeta?.meta || ""
      });
      currentBody = "";
      currentMeta = null;
    }
  }

  function startNewChapter(meta){
    if(currentBody.trim()) flushPage();

    if(CHAPTER_ON_RIGHT){
      const nextIndex = pages.length; // 0:left, 1:right
      const isRight = (nextIndex % 2) === 1;
      if(!isRight){
        pages.push({ body:"", head:"", title:"", meta:"" });
      }
    }

    currentMeta = meta;

    // Ensure a page exists even if the chapter has no body yet
    if(!currentBody.trim()){
      flushPage();
    }
  }

  for(const p of paras){
    const meta = isHeading(p);
    if(meta){ startNewChapter(meta); continue; }

    const joiner = currentBody ? "\n\n" : "";
    const candidate = currentBody + joiner + p;
    if(countLines(candidate) <= LINES_PER_PAGE){
      currentBody = candidate;
      continue;
    }

    if(countLines(p) <= LINES_PER_PAGE){
      flushPage();
      currentBody = p;
      continue;
    }

    const sentences = sentenceSplit(p);
    let buf = "";
    for(const s of sentences){
      const c = (buf? buf+" " : "") + s;
      if(countLines(c) <= LINES_PER_PAGE){
        buf = c;
      }else{
        if(currentBody){
          const tryFill = currentBody + "\n\n" + buf;
          if(buf && countLines(tryFill) <= LINES_PER_PAGE){
            currentBody = tryFill;
            flushPage();
          }else{
            flushPage();
            if(buf) pages.push({ body: buf, head:"", title:"", meta:"" });
          }
        }else{
          if(buf) pages.push({ body: buf, head:"", title:"", meta:"" });
        }
        buf = s;
      }
    }
    if(buf){
      if(currentBody){
        const tryFill2 = currentBody + "\n\n" + buf;
        if(countLines(tryFill2) <= LINES_PER_PAGE){
          currentBody = tryFill2;
        }else{
          flushPage();
          currentBody = buf;
        }
      }else{
        currentBody = buf;
      }
    }
  }

  if(currentBody.trim() || currentMeta?.title) flushPage();
  return pages;
}

  const books = loadJSON(LS_BOOK_OFFLINE, {});
  if(!books.en) books.en = MASTER_EN; // guarantee English exists
  return books;
}
function setOfflineBooks(books){
  books.en = books.en || MASTER_EN;
  saveJSON(LS_BOOK_OFFLINE, books);
}

/* Active language state */
let activeLang = localStorage.getItem(LS_LANG) || "en";
let activeMode = localStorage.getItem(LS_MODE) || "offline";

/* Returns the RAW_BOOK for active language based on mode */
function getActiveRaw(){
  const books = getOfflineBooks();
  if(activeMode === "offline"){
    return books[activeLang] || (activeLang==="en" ? MASTER_EN : "");
  }
  // online mode still renders from offline if present, else fall back to English
  return books[activeLang] || (activeLang==="en" ? MASTER_EN : MASTER_EN);
}

/* ==========================
   Rendering/State
   ========================== */
let pages = [];
let leftIndex = 0;

const L_head = document.getElementById("L_head");
const L_title= document.getElementById("L_title");
const L_meta = document.getElementById("L_meta");
const L_body = document.getElementById("L_body");
const L_num  = document.getElementById("L_num");

const R_head = document.getElementById("R_head");
const R_title= document.getElementById("R_title");
const R_meta = document.getElementById("R_meta");
const R_body = document.getElementById("R_body");
const R_num  = document.getElementById("R_num");

function setStatus(msg, kind="ok"){
  const el = document.getElementById("status");
  el.className = "status " + (kind || "ok");
  el.textContent = msg;
}

function renderSpread(anim){
  if(leftIndex<0) leftIndex=0;
  if(leftIndex>Math.max(0,pages.length-1)) leftIndex = Math.max(0,pages.length-1);

  const L = pages[leftIndex] || {body:"",head:"",title:"",meta:""};
  const R = pages[leftIndex+1] || {body:"",head:"",title:"",meta:""};

  L_head.textContent = L.head||"";
  L_title.textContent= L.title||"";
  L_meta.textContent = L.meta||"";
  L_body.textContent = L.body||"";
  L_num.textContent  = "Page " + (leftIndex+1);

  R_head.textContent = R.head||"";
  R_title.textContent= R.title||"";
  R_meta.textContent = R.meta||"";
  R_body.textContent = R.body||"";
  R_num.textContent  = R.body ? ("Page " + (leftIndex+2)) : "";

  const spreads = Math.max(1, Math.ceil(pages.length/2));
  const currentSpread = Math.floor(leftIndex/2) + 1;
  document.getElementById("pageInfo").textContent = `Spread ${currentSpread} of ${spreads} — ${activeLang.toUpperCase()} (${activeMode.toUpperCase()})`;

  document.getElementById("prevBtn").disabled = (leftIndex<=0);
  document.getElementById("nextBtn").disabled = (leftIndex>=pages.length-2);

  const book = document.getElementById("book");
  book.classList.remove("turning-left","turning-right");
  if(anim==="left")  book.classList.add("turning-left");
  if(anim==="right") book.classList.add("turning-right");
  setTimeout(()=>book.classList.remove("turning-left","turning-right"), 450);
}

/* =================
   TOC + Marker
   ================= */
document.getElementById("tocBtn").onclick = ()=>{
  const items = [];
  for(let i=0;i<pages.length;i++){
    const p = pages[i];
    // Only take the first page that has a title/head and avoid duplicates by requiring page index even
    if((p.title || p.head) && (i % 2 === 0)){
      items.push({label: (p.title || p.head || "Chapter"), page: i+1});
    }
  }
  const list = items.map((it,k)=> `${k+1}. ${it.label} (p.${it.page})`).join("\n");
  const pick = prompt("Table of Contents:\n\n"+(list||"(no entries)")+"\n\nEnter page number to jump:");
  if(!pick) return;
  let target = parseInt(pick,10);
  if(Number.isFinite(target)){
    target = Math.min(Math.max(1,target), pages.length);
    leftIndex = target-1 - ((target-1)%2);
    renderSpread("left");
  }
};

document.getElementById("placeBtn").onclick = ()=>{
  localStorage.setItem(LS_MARK, String(leftIndex));
  setStatus("Marker placed at page "+(leftIndex+1), "ok");
};
document.getElementById("jumpBtn").onclick = ()=>{
  const raw = localStorage.getItem(LS_MARK)||"0";
  const idx = Math.max(0, Math.min(pages.length-1, parseInt(raw,10)||0));
  leftIndex = idx - (idx%2);
  renderSpread("left");
  setStatus("Jumped to marker.", "ok");
};

/* =========
   Nav/Keys
   ========= */
document.getElementById("prevBtn").onclick = ()=>{
  if(leftIndex<=0) return;
  leftIndex = Math.max(0, leftIndex-2);
  renderSpread("right");
};
document.getElementById("nextBtn").onclick = ()=>{
  if(leftIndex>=pages.length-2) return;
  leftIndex = Math.min(pages.length-2, leftIndex+2);
  renderSpread("left");
};
document.addEventListener("keydown", (e)=>{
  if(e.key==="ArrowLeft")  document.getElementById("prevBtn").click();
  if(e.key==="ArrowRight") document.getElementById("nextBtn").click();
});

/* ==========================
   Language + Mode controls
   ========================== */
const langSel = document.getElementById("langSel");
const modeSel = document.getElementById("modeSel");
const translateBtn = document.getElementById("translateBtn");
const saveLangBtn = document.getElementById("saveLangBtn");

langSel.value = activeLang;
modeSel.value = activeMode;

function applyModeUI(){
  const online = (activeMode === "online");
  translateBtn.disabled = !online;
  if(online){
    setStatus("Online mode: Translate Book uses MyMemory (internet). Results can be saved to Offline Library.", "bad");
  }else{
    setStatus("Offline Library mode: fully local. Switch to Online mode to generate a translation, then Save Language.", "ok");
  }
}
applyModeUI();

langSel.addEventListener("change", ()=>{
  activeLang = langSel.value;
  localStorage.setItem(LS_LANG, activeLang);
  init(true);
});

modeSel.addEventListener("change", ()=>{
  activeMode = modeSel.value;
  localStorage.setItem(LS_MODE, activeMode);
  applyModeUI();
  init(true);
});

saveLangBtn.onclick = ()=>{
  const raw = normalize(getActiveRaw());
  const books = getOfflineBooks();
  // Save whatever is currently rendering for this language.
  books[activeLang] = raw || (activeLang==="en" ? MASTER_EN : "");
  setOfflineBooks(books);
  setStatus(`Saved ${activeLang.toUpperCase()} to Offline Library.`, "ok");
};

/* ==========================
   Online translation (paragraph-by-paragraph)
   ========================== */
function txCacheKey(from,to,text){ return `${from}|${to}|${text}`; }
function getTxCache(){ return loadJSON(LS_TX_CACHE, {}); }
function setTxCache(c){ saveJSON(LS_TX_CACHE, c); }

async function translateTextMyMemory(from, to, text){
  // Note: free endpoints can rate-limit; we cache results locally.
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
  const res = await fetch(url, { method:"GET" });
  if(!res.ok) throw new Error("HTTP "+res.status);
  const data = await res.json();
  const translated = (data && data.responseData && data.responseData.translatedText) ? String(data.responseData.translatedText) : "";
  if(!translated) throw new Error("No translatedText returned.");
  return translated;
}

translateBtn.onclick = async ()=>{
  if(activeMode !== "online") return;

  const target = activeLang;
  if(target === "en"){
    setStatus("English is the master. Choose another language to translate into.", "bad");
    return;
  }

  const sourceRaw = MASTER_EN; // always translate from master English for consistency
  const paras = paragraphs(sourceRaw);

  setStatus(`Translating to ${target.toUpperCase()}… (paragraph-by-paragraph)`, "bad");
  translateBtn.disabled = true;
  langSel.disabled = true;
  modeSel.disabled = true;

  const cache = getTxCache();
  const outParas = [];

  try{
    for(let i=0;i<paras.length;i++){
      const p = paras[i];
      const meta = isHeading(p);
      if(meta){
        // Keep headings as-is (you can manually localize later if desired)
        outParas.push(p);
        continue;
      }

      const key = txCacheKey("en", target, p);
      let t = cache[key];
      if(!t){
        t = await translateTextMyMemory("en", target, p);
        cache[key] = t;
        setTxCache(cache);
      }
      outParas.push(t);

      if((i+1) % 3 === 0){
        setStatus(`Translating… ${i+1}/${paras.length} paragraphs`, "bad");
      }
    }

    const translatedRaw = outParas.join("\n\n");
    const books = getOfflineBooks();
    books[target] = translatedRaw;
    setOfflineBooks(books);

    setStatus(`Translation complete ✓ Saved ${target.toUpperCase()} into Offline Library.`, "ok");

    // Switch to offline rendering for stability
    activeMode = "offline";
    modeSel.value = activeMode;
    localStorage.setItem(LS_MODE, activeMode);
    applyModeUI();
    init(true);

  }catch(e){
    setStatus("Translation failed: " + (e && e.message ? e.message : "Unknown error"), "bad");
  }finally{
    translateBtn.disabled = (activeMode !== "online");
    langSel.disabled = false;
    modeSel.disabled = false;
  }
};

/* ==========================
   Init
   ========================== */
function init(keepPlace){
  const oldLeft = leftIndex;
  const raw = getActiveRaw();
  pages = paginate(raw && raw.trim() ? raw : (activeLang==="en" ? MASTER_EN : ""));
  if(!keepPlace) leftIndex = 0;
  else leftIndex = Math.min(Math.max(0, oldLeft), Math.max(0, pages.length-1));
  leftIndex = leftIndex - (leftIndex % 2);
  renderSpread();
}
init();

/* ==========================
   Copy Discouragement (speed bump)
   Secret toggle: Ctrl+Shift+L
   ========================== */
(function discourageCopy(){
  let enabled = localStorage.getItem(LS_PROT);
  if(enabled === null) enabled = "1";
  localStorage.setItem(LS_PROT, enabled);

  function editable(t){
    return t && (t.tagName==="TEXTAREA" || t.tagName==="INPUT" || t.isContentEditable);
  }

  document.addEventListener("contextmenu", (e)=>{
    if(localStorage.getItem(LS_PROT)!=="1") return;
    if(editable(e.target)) return;
    e.preventDefault();
    setStatus("Right-click disabled on this view.", "bad");
  });

  document.addEventListener("keydown", (e)=>{
    const k = (e.key || "").toLowerCase();
    const ctrl = e.ctrlKey || e.metaKey;

    // Secret author toggle
    if(ctrl && e.shiftKey && k==="l"){
      e.preventDefault();
      const cur = localStorage.getItem(LS_PROT)==="1";
      localStorage.setItem(LS_PROT, cur ? "0" : "1");
      setStatus(cur ? "Author Mode ✓ protection OFF" : "Protection ON", "ok");
      return;
    }

    if(localStorage.getItem(LS_PROT)!=="1") return;

    const blocked =
      (ctrl && ["c","x","s","u","p","a"].includes(k)) ||
      (e.key === "F12") ||
      (ctrl && e.shiftKey && ["i","j","c"].includes(k));

    if(blocked){
      if(editable(document.activeElement)) return;
      e.preventDefault();
      setStatus("Copy/inspect shortcut blocked on this view.", "bad");
    }
  });

  document.addEventListener("copy", (e)=>{
    if(localStorage.getItem(LS_PROT)!=="1") return;
    if(editable(document.activeElement)) return;
    e.preventDefault();
    setStatus("Copy disabled on this view.", "bad");
  });
})();
</script>
